# .github/workflows/main.yml
name: Black Duck SCA Scan

on:
  push:
    branches: [main, master, develop, stage, release]
  pull_request:
    branches: [main, master, develop, stage, release]
  workflow_dispatch:

jobs:
  blackduck-scan:
    runs-on: [self-hosted, macOS, ARM64]

    env:
      PATH: /opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
      DETECT_DETECTOR_SEARCH_DEPTH: 3
      DETECT_DETECTOR_SEARCH_CONTINUE: true
      DETECT_PROJECT_NAME: ${{ github.event.repository.name }}
      DETECT_PROJECT_VERSION_NAME: ${{ github.ref_name }}
      DETECT_NPM_ARGUMENTS: "--legacy-peer-deps"

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Java (Temurin on Apple Silicon)
        run: |
          echo "JAVA_HOME=$(/usr/libexec/java_home -v 21)" >> $GITHUB_ENV

      - name: Verify Tool Availability
        continue-on-error: true
        run: |
          echo "--- Java ---"
          java -version
          echo "--- Node ---"
          node -v || echo "Node not found (optional)"
          echo "--- npm ---"
          npm -v || echo "npm not found (optional)"
          echo "--- Maven ---"
          mvn -version || echo "Maven not found (optional)"
          echo "--- Gradle ---"
          gradle -version || echo "Gradle not found (optional)"
          echo "--- Git ---"
          git --version

      - name: Black Duck SCA Scan
        id: black-duck-sca-scan
        uses: blackduck-inc/black-duck-security-scan@v2
        with:
          blackducksca_url: ${{ vars.BLACKDUCK_URL }}
          blackducksca_token: ${{ secrets.BLACKDUCK_TOKEN }}
          blackducksca_fixpr_enabled: true
          blackducksca_fixpr_maxCount: 5
          blackducksca_fixpr_filter_severities: 'CRITICAL,HIGH'
          blackducksca_fixpr_useUpgradeGuidance: 'SHORT_TERM,LONG_TERM'
          blackducksca_prcomment_enabled: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
