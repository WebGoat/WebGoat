name: DevSecOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn clean package -DskipTests

  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/java
        continue-on-error: true

  sast-sonarcloud:
    name: SAST - SonarCloud
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: SonarCloud Scan
        run: mvn verify sonar:sonar
          -Dsonar.projectKey=mehatecodethings_WebGoat
          -Dsonar.organization=mehatecodethings
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sca-snyk:
    name: SCA - Snyk
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk
        uses: snyk/actions/maven@master
        with:
          args: --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

  dast-zap:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: build
    services:
      webgoat:
        image: webgoat/webgoat
        ports:
          - 8080:8080
        options: >-
          --health-cmd "curl -f http://localhost:8080/WebGoat/login || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Wait for WebGoat to be ready
        run: |
          echo "Waiting for WebGoat..."
          for i in {1..30}; do
            curl -s http://localhost:8080/WebGoat/login && break
            sleep 1s0
          done
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080/WebGoat'
          fail_action: false
        continue-on-error: true

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sast-sonarcloud, sca-snyk, dast-zap]
    steps:
      - name: Check SonarCloud Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}