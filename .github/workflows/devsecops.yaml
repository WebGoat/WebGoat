name: DevSecOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn clean package -DskipTests

  sast-semgrep:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/java
        continue-on-error: true

  sast-sonarcloud:
    name: SAST - SonarCloud
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: SonarCloud Scan
        run: mvn verify sonar:sonar
          -Dsonar.projectKey=mehatecodethings_WebGoat
          -Dsonar.organization=mehatecodethings
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  sca-snyk:
    name: SCA - Snyk
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk
        uses: snyk/actions/maven@master
        with:
          args: --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

  dast-zap:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Start WebGoat
        run: |
          docker run -d --name webgoat \
            -p 8080:8080 -p 9090:9090 \
            -e WEBGOAT_PORT=8080 \
            webgoat/webgoat
      - name: Wait for WebGoat to be ready
        run: |
          echo "Waiting for WebGoat to start..."
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/WebGoat/login | grep -q "200\|302"; then
              echo "WebGoat is up!"
              break
            fi
            echo "Attempt $i - not ready yet, waiting 15s..."
            sleep 15
          done
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080/WebGoat'
          fail_action: false
        continue-on-error: true

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [sast-semgrep, sast-sonarcloud, sca-snyk, dast-zap]
    steps:
      - name: Check SonarCloud Quality Gate
        run: |
          echo "Checking SonarCloud Quality Gate..."
          STATUS=$(curl -s -u ${{ secrets.SONAR_TOKEN }}: \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=mehatecodethings_WebGoat" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['projectStatus']['status'])")
          echo "Quality Gate Status: $STATUS"
          if [ "$STATUS" != "OK" ]; then
            echo "Quality Gate FAILED with status: $STATUS"
            exit 1
          fi
          echo "Quality Gate PASSED"