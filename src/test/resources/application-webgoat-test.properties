webgoat.user.directory=${java.io.tmpdir}

spring.datasource.url=jdbc:hsqldb:mem:test
spring.flyway.locations=classpath:/db/container
spring.main.banner-mode=off
spring.jpa.properties.hibernate.default_schema=CONTAINER
# Hibernate 7 (Spring Boot 4) no longer creates the schema implicitly; the
# in-memory test database needs the CONTAINER schema created before DDL runs.
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

spring.datasource.driver-class-name=org.hsqldb.jdbc.JDBCDriver
