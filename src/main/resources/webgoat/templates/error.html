<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>WebGoat - Error</title>
    <link rel="shortcut icon" th:href="@{/css/img/favicon.ico}" type="image/x-icon"/>
    <link rel="stylesheet" type="text/css" th:href="@{/css/main.css}"/>
    <link rel="stylesheet" type="text/css" th:href="@{/plugins/bootstrap/css/bootstrap.min.css}"/>
    <link rel="stylesheet" type="text/css" th:href="@{/css/font-awesome.min.css}"/>
    <link rel="stylesheet" type="text/css" th:href="@{/css/animate.css}"/>
</head>
<body>
<section id="container">
    <header id="header">
        <div class="brand">
            <a th:href="@{/start.mvc}" class="logo"><span>Web</span>Goat</a>
        </div>
    </header>
    <section class="main-content-wrapper">
        <section id="main-content">
            <div class="container">
                <br/>
                <div class="panel panel-danger">
                    <div class="panel-heading">
                        <h3 class="panel-title">
                            <i class="fa fa-exclamation-triangle"></i>
                            Error - <span th:text="${status}">500</span> <span th:text="${error}">Internal Server Error</span>
                        </h3>
                    </div>
                    <div class="panel-body">
                        <p th:if="${message}">
                            <strong>Message:</strong> <span th:text="${message}"/>
                        </p>
                        <p>
                            <strong>Path:</strong> <code th:text="${path}">/</code>
                        </p>
                        <p>
                            <strong>Timestamp:</strong> <span th:text="${#temporals.format(timestamp, 'yyyy-MM-dd HH:mm:ss')}"/>
                        </p>
                        <hr/>
                        <h5>System Information</h5>
                        <table class="table table-striped table-condensed">
                            <tr>
                                <td>WebGoat Version</td>
                                <td th:text="${@environment.getProperty('webgoat.build.version')}"/>
                            </tr>
                            <tr>
                                <td>Java Version</td>
                                <td th:text="${T(java.lang.System).getProperty('java.version')}"/>
                            </tr>
                            <tr>
                                <td>Java Runtime</td>
                                <td th:text="${T(java.lang.System).getProperty('java.vm.name')}"/>
                            </tr>
                            <tr>
                                <td>Operating System</td>
                                <td th:text="${T(java.lang.System).getProperty('os.name')}"/>
                            </tr>
                            <tr>
                                <td>OS Version</td>
                                <td th:text="${T(java.lang.System).getProperty('os.version')}"/>
                            </tr>
                            <tr>
                                <td>OS Architecture</td>
                                <td th:text="${T(java.lang.System).getProperty('os.arch')}"/>
                            </tr>
                        </table>
                        <hr/>
                        <a th:href="@{/start.mvc}" class="btn btn-primary"><i class="fa fa-home"></i> Return to WebGoat</a>
                    </div>
                </div>
            </div>
        </section>
    </section>
</section>
</body>
</html>
